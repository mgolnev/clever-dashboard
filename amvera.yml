meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile
  skip: false

run:
  # Приложение слушает :80 (дефолт Amvera, процесс от root). Порт совпадает
  # с servicePort/containerPort по умолчанию — внешний трафик доходит без доп. настройки.
  containerPort: 80
  persistenceMount: /data
