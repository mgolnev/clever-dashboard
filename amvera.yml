meta:
  environment: docker
  toolchain:
    name: docker

build:
  dockerfile: Dockerfile
  skip: false

run:
  # Amvera по умолчанию проксирует порт 80; в образе PORT=80 (setcap на бинарь).
  containerPort: 80
  # Постоянное хранилище: сюда пишется SQLite (DB_DSN=/data/clever.db).
  persistenceMount: /data
